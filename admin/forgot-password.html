<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Shapehugs</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Custom CSS (Reused) -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        body { background-color: #fbf9f7; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .auth-wrapper { width: 100%; max-width: 450px; padding: 20px; }
        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-header h1 { font-size: 28px; margin-bottom: 10px; color: var(--text-color); }
        .auth-footer { text-align: center; margin-top: 20px; font-size: 13px; color: var(--muted-text); }
        .auth-footer a { color: var(--text-color); font-weight: 600; text-decoration: underline; transition: var(--transition); }
        .auth-footer a:hover { color: var(--accent-color); }
    </style>
</head>

<body>

    <div class="auth-wrapper">
        <div class="auth-header">
            <h1 class="serif">Reset Password</h1>
            <p class="text-muted small text-uppercase letter-spacing-1">Enter your email to receive instructions</p>
        </div>

        <div class="account-card">
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="admin@shapehugs.com">
                </div>

                <button type="submit" class="btn-primary" style="width: 100%;">Send Reset Link</button>
                
                <div style="text-align: center; margin-top: 20px;">
                     <a href="index.html" style="font-size: 12px; text-transform: uppercase; font-weight: 600; letter-spacing: 1px; color: var(--muted-text); text-decoration: none;">Cancel</a>
                </div>
            </form>
        </div>

        <div class="auth-footer">
            <p>Remember your credentials? <a href="index.html">Back to Login</a></p>
        </div>
    </div>

</body>
</html>
