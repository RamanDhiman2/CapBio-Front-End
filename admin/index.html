<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Shapehugs</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Custom CSS (Reused) -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        body { background-color: #fbf9f7; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .auth-wrapper { width: 100%; max-width: 450px; padding: 20px; }
        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-header h1 { font-size: 28px; margin-bottom: 10px; color: var(--text-color); }
        .auth-footer { text-align: center; margin-top: 20px; font-size: 13px; color: var(--muted-text); }
        .auth-footer a { color: var(--text-color); font-weight: 600; text-decoration: underline; transition: var(--transition); }
        .auth-footer a:hover { color: var(--accent-color); }
        .form-check { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-color); cursor: pointer; }
        .form-check input { width: auto; margin: 0; cursor: pointer; }
    </style>
</head>

<body>

    <div class="auth-wrapper">
        <div class="auth-header">
            <h1 class="serif">Shapehugs Admin</h1>
            <p class="text-muted small text-uppercase letter-spacing-1">Secure Dashboard Access</p>
        </div>

        <div class="account-card">
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="admin@shapehugs.com">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                    <label class="form-check">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="forgot-password.html" style="font-size: 12px; color: var(--muted-text);">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-primary" style="width: 100%;">Sign In</button>
            </form>
        </div>

        <div class="auth-footer">
            <p>New staff member? <a href="register.html">Request Access</a></p>
            <p style="margin-top: 20px;"><a href="../index.html" style="text-decoration: none; font-size: 12px;"><i class="fa-solid fa-arrow-left"></i> Return to Shop</a></p>
        </div>
    </div>

</body>
</html>
