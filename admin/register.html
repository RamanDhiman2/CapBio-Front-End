<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Registration | Shapehugs</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Custom CSS (Reused) -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        body { background-color: #fbf9f7; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 40px 0; }
        .auth-wrapper { width: 100%; max-width: 500px; padding: 20px; }
        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-header h1 { font-size: 28px; margin-bottom: 10px; color: var(--text-color); }
        .auth-footer { text-align: center; margin-top: 20px; font-size: 13px; color: var(--muted-text); }
        .auth-footer a { color: var(--text-color); font-weight: 600; text-decoration: underline; transition: var(--transition); }
        .auth-footer a:hover { color: var(--accent-color); }
    </style>
</head>

<body>

    <div class="auth-wrapper">
        <div class="auth-header">
            <h1 class="serif">Create Admin Account</h1>
            <p class="text-muted small text-uppercase letter-spacing-1">Join the management team</p>
        </div>

        <div class="account-card">
            <form action="#" method="POST">
                <div class="form-row" style="margin-bottom: 0; gap: 20px;">
                    <div class="form-group">
                        <label for="fname">First Name</label>
                        <input type="text" id="fname" required placeholder="Jane">
                    </div>
                    <div class="form-group">
                        <label for="lname">Last Name</label>
                        <input type="text" id="lname" required placeholder="Doe">
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Work Email</label>
                    <input type="email" id="email" required placeholder="name@shapehugs.com">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Minimum 8 characters">
                </div>

                <button type="submit" class="btn-primary" style="width: 100%;">Create Account</button>
            </form>
        </div>

        <div class="auth-footer">
            <p>Already have access? <a href="index.html">Login Here</a></p>
        </div>
    </div>

</body>
</html>
